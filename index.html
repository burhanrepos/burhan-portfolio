<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Burhan Shaheen | Full Stack Engineer Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Set theme before first paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var theme = stored
            ? stored
            : window.matchMedia("(prefers-color-scheme: light)").matches
            ? "light"
            : "dark";
          var root = document.documentElement;
          root.classList.remove("light", "dark");
          root.classList.add(theme);
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body class="bg-zinc-950 text-zinc-100 antialiased selection:bg-violet-500/30 selection:text-violet-200">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
