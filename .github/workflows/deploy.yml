name: Deploy Vite Portfolio to GitHub Pages

# Trigger the workflow on push to master branch
on:
  push:
    branches:
      - master
  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js environment with caching
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Build the Vite project for production
      - name: Build Vite project
        run: npm run build -- --base=/burhan-portfolio/

      # Step 5: Remove stale Pages artifacts from this workflow run before uploading a fresh one
      - name: Remove stale Pages artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name=="github-pages") | .id' | while read -r artifact_id; do
              if [ -n "$artifact_id" ]; then
                gh api --method DELETE \
                  -H "Accept: application/vnd.github+json" \
                  "/repos/${{ github.repository }}/actions/artifacts/$artifact_id"
              fi
            done

      # Step 6: Upload build artifacts for GitHub Pages
      - name: Upload build artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      # Step 6: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4