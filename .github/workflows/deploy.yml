name: Deploy Vite Portfolio to GitHub Pages

# Trigger the workflow on push to master branch
on:
  push:
    branches:
      - master
  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Sets permissions for GitHub Pages deployment
permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js environment with caching
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Build the Vite project for production
      - name: Build Vite project
        run: npm run build -- --base=/burhan-portfolio/

      # Step 5: Remove stale Pages artifacts from this workflow run before uploading a fresh one
      - name: Remove stale Pages artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const run_id = context.runId;
            const { data } = await github.rest.actions.listWorkflowRunArtifacts({ owner, repo, run_id });
            for (const artifact of data.artifacts.filter((artifact) => artifact.name === 'github-pages')) {
              await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: artifact.id });
            }

      # Step 6: Upload build artifacts for GitHub Pages
      - name: Upload build artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      # Step 6: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4